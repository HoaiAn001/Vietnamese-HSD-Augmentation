project:
  name: vietnamese-hsd-augmentation
  seed: 42
  label_names:
    - CLEAN
    - OFFENSIVE
    - HATE

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  augmented_dir: data/augmented
  metrics_dir: results/metrics
  figures_dir: results/figures
  error_analysis_dir: results/error_analysis
  saved_models_dir: saved_models

data:
  train_file: data/processed/train.csv
  dev_file: data/processed/dev.csv
  test_file: data/processed/test.csv
  text_column: text
  label_column: label
  private_vlsp_file: null

huggingface:
  dataset_repo_id: HoaiAn001/vietnamese-hsd-combined
  model_repo_prefix: HoaiAn001/vietnamese-hsd
  private: true
  baseline_config: baseline
  split_names:
    train: train
    dev: validation
    test: test

augmentation:
  samples_per_label:
    CLEAN: 0
    OFFENSIVE: 500
    HATE: 500
  back_translation:
    intermediate_language: en
    source_language: vi
    max_samples: 1000
    output_file: data/augmented/bt_only.csv
  eda:
    operations:
      - random_swap
      - random_deletion
      - random_insertion
    alpha: 0.1
    num_aug: 1
    output_file: data/augmented/eda_only.csv
  llm:
    max_samples: 300
    prompt_template: "Rewrite the Vietnamese sentence while preserving the same hate-speech label. Label: {label}. Sentence: {text}"
    output_file: data/augmented/llm_only.csv
    prompt_log_file: data/augmented/llm_prompts.jsonl

training:
  model_name: vinai/phobert-base
  output_dir: saved_models/baseline_phobert
  max_length: 128
  batch_size: 16
  learning_rate: 0.00002
  epochs: 3
  weight_decay: 0.01
  warmup_ratio: 0.06
  evaluation_strategy: epoch
  save_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: macro_f1

experiments:
  required:
    - baseline
    - bt_only
    - eda_only
    - llm_only
    - combined
